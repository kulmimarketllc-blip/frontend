<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:#f1f5f9;padding:24px;}
.section-label{font-size:9px;letter-spacing:0.14em;color:#94a3b8;text-transform:uppercase;margin-bottom:10px;}
.card{border-radius:16px;padding:36px 32px;display:flex;align-items:center;gap:28px;margin-bottom:14px;}
.dark{background:#0A0F1E;}
.light{background:#fff;border:1px solid #e2e8f0;}
.version-label{text-align:center;font-size:11px;color:#94a3b8;margin-bottom:20px;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:6px;}
.icon-row{display:flex;gap:14px;align-items:center;justify-content:center;margin:16px 0 6px;}
.icon-label{font-size:10px;color:#94a3b8;text-align:center;margin-top:6px;}
</style>
</head><body>

<!-- ══════════════════════════════════ -->
<!-- COMBINED: CIRCLE + STACKED BOX   -->
<!-- ══════════════════════════════════ -->
<div class="section-label">Kulmi Market — Combined Style 5 & 6</div>

<!-- DARK VERSION -->
<div class="section-label">Dark version</div>
<div class="card dark">
  <!-- Circle emblem -->
  <svg width="100" height="100" viewBox="0 0 100 100" style="flex-shrink:0;">
    <circle cx="50" cy="50" r="46" fill="none" stroke="#00C9A7" stroke-width="2.5"/>
    <circle cx="50" cy="50" r="38" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.12"/>
    <!-- Stacked boxes inside circle -->
    <rect x="18" y="34" width="64" height="22" rx="5" fill="#00C9A7"/>
    <rect x="18" y="60" width="64" height="22" rx="5" fill="#ffffff" opacity="0.12"/>
    <text x="50" y="51" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="14" fill="#0A0F1E" text-anchor="middle">KULMI</text>
    <text x="50" y="76" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="14" fill="#ffffff" text-anchor="middle" opacity="0.7">MARKET</text>
  </svg>

  <!-- Wordmark with stacked boxes -->
  <div>
    <div style="display:flex;flex-direction:column;gap:7px;margin-bottom:10px;">
      <div style="background:#00C9A7;border-radius:8px;padding:9px 20px;display:inline-block;">
        <span style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#0A0F1E;letter-spacing:0.06em;">KULMI</span>
      </div>
      <div style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:9px 20px;display:inline-block;">
        <span style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#ffffff;letter-spacing:0.06em;">MARKET</span>
      </div>
    </div>
    <div style="font-size:9.5px;letter-spacing:0.22em;color:#64748b;">WHERE EAST AFRICA GATHERS</div>
  </div>
</div>
<div class="version-label">Dark version</div>

<!-- LIGHT VERSION -->
<div class="section-label">Light version</div>
<div class="card light">
  <!-- Circle emblem light -->
  <svg width="100" height="100" viewBox="0 0 100 100" style="flex-shrink:0;">
    <circle cx="50" cy="50" r="46" fill="none" stroke="#0A0F1E" stroke-width="2.5"/>
    <circle cx="50" cy="50" r="38" fill="none" stroke="#0A0F1E" stroke-width="0.5" opacity="0.12"/>
    <rect x="18" y="34" width="64" height="22" rx="5" fill="#00C9A7"/>
    <rect x="18" y="60" width="64" height="22" rx="5" fill="#0A0F1E"/>
    <text x="50" y="51" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="14" fill="#0A0F1E" text-anchor="middle">KULMI</text>
    <text x="50" y="76" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="14" fill="#ffffff" text-anchor="middle">MARKET</text>
  </svg>

  <div>
    <div style="display:flex;flex-direction:column;gap:7px;margin-bottom:10px;">
      <div style="background:#00C9A7;border-radius:8px;padding:9px 20px;display:inline-block;">
        <span style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#0A0F1E;letter-spacing:0.06em;">KULMI</span>
      </div>
      <div style="background:#0A0F1E;border-radius:8px;padding:9px 20px;display:inline-block;">
        <span style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#ffffff;letter-spacing:0.06em;">MARKET</span>
      </div>
    </div>
    <div style="font-size:9.5px;letter-spacing:0.22em;color:#94a3b8;">WHERE EAST AFRICA GATHERS</div>
  </div>
</div>
<div class="version-label">Light version</div>

<!-- ICON VARIANTS -->
<div class="section-label">Icon variants</div>
<div class="icon-row">

  <!-- Dark circle -->
  <div style="text-align:center;">
    <svg width="72" height="72" viewBox="0 0 72 72">
      <circle cx="36" cy="36" r="34" fill="#0A0F1E"/>
      <circle cx="36" cy="36" r="28" fill="none" stroke="#00C9A7" stroke-width="1.5"/>
      <rect x="12" y="22" width="48" height="14" rx="4" fill="#00C9A7"/>
      <rect x="12" y="40" width="48" height="14" rx="4" fill="#ffffff" opacity="0.15"/>
      <text x="36" y="33" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="10" fill="#0A0F1E" text-anchor="middle">KULMI</text>
      <text x="36" y="51" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="10" fill="#ffffff" text-anchor="middle" opacity="0.8">MARKET</text>
    </svg>
    <div class="icon-label">Dark circle</div>
  </div>

  <!-- Teal circle -->
  <div style="text-align:center;">
    <svg width="72" height="72" viewBox="0 0 72 72">
      <circle cx="36" cy="36" r="34" fill="#00C9A7"/>
      <circle cx="36" cy="36" r="28" fill="none" stroke="#0A0F1E" stroke-width="1.5" opacity="0.3"/>
      <rect x="12" y="22" width="48" height="14" rx="4" fill="#0A0F1E"/>
      <rect x="12" y="40" width="48" height="14" rx="4" fill="#0A0F1E" opacity="0.15"/>
      <text x="36" y="33" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="10" fill="#00C9A7" text-anchor="middle">KULMI</text>
      <text x="36" y="51" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="10" fill="#0A0F1E" text-anchor="middle" opacity="0.8">MARKET</text>
    </svg>
    <div class="icon-label">Teal circle</div>
  </div>

  <!-- Square dark -->
  <div style="text-align:center;">
    <svg width="72" height="72" viewBox="0 0 72 72">
      <rect x="2" y="2" width="68" height="68" rx="16" fill="#0A0F1E"/>
      <rect x="10" y="18" width="52" height="16" rx="4" fill="#00C9A7"/>
      <rect x="10" y="38" width="52" height="16" rx="4" fill="#ffffff" opacity="0.12"/>
      <text x="36" y="30" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="11" fill="#0A0F1E" text-anchor="middle">KULMI</text>
      <text x="36" y="50" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="11" fill="#ffffff" text-anchor="middle" opacity="0.8">MARKET</text>
    </svg>
    <div class="icon-label">Dark square</div>
  </div>

  <!-- Square teal -->
  <div style="text-align:center;">
    <svg width="72" height="72" viewBox="0 0 72 72">
      <rect x="2" y="2" width="68" height="68" rx="16" fill="#00C9A7"/>
      <rect x="10" y="18" width="52" height="16" rx="4" fill="#0A0F1E"/>
      <rect x="10" y="38" width="52" height="16" rx="4" fill="#0A0F1E" opacity="0.15"/>
      <text x="36" y="30" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="11" fill="#00C9A7" text-anchor="middle">KULMI</text>
      <text x="36" y="50" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="11" fill="#0A0F1E" text-anchor="middle">MARKET</text>
    </svg>
    <div class="icon-label">Teal square</div>
  </div>

  <!-- White outline -->
  <div style="text-align:center;">
    <svg width="72" height="72" viewBox="0 0 72 72">
      <rect x="2" y="2" width="68" height="68" rx="16" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
      <rect x="10" y="18" width="52" height="16" rx="4" fill="#00C9A7"/>
      <rect x="10" y="38" width="52" height="16" rx="4" fill="#0A0F1E"/>
      <text x="36" y="30" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="11" fill="#0A0F1E" text-anchor="middle">KULMI</text>
      <text x="36" y="50" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="11" fill="#ffffff" text-anchor="middle">MARKET</text>
    </svg>
    <div class="icon-label">Light square</div>
  </div>

</div>

</body></html>
